<h2>Harry Potter Characters Filter</h2>

<mat-form-field appearance="fill" class="filter-box">
  <mat-label>Select House</mat-label>
  <mat-select [(ngModel)]="selectedHouse" (selectionChange)="onHouseChange()">
    <mat-option *ngFor="let house of houses" [value]="house">
      {{ house }}
    </mat-option>
  </mat-select>
</mat-form-field>

<div class="card-container">
  <mat-card class="character-card" *ngFor="let character of characters" (click)="goToDetails(character.id)">
    <img mat-card-image [src]="character.image" [alt]="character.name">
    <mat-card-content>
      <h3>{{ character.name }}</h3>
      <p>Actor: {{ character.actor }}</p>
      <p>{{ character.house }}</p>
    </mat-card-content>
  </mat-card>
</div>
