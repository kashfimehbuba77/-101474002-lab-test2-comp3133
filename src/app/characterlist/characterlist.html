<h2>All Harry Potter Characters</h2>

<div class="card-container">
  <mat-card class="character-card" *ngFor="let character of characters" (click)="goToDetails(character.id)">
    <img mat-card-image [src]="character.image" [alt]="character.name">
    <mat-card-content>
      <h3>{{ character.name }}</h3>
      <p>{{ character.house || 'No House' }}</p>
    </mat-card-content>
  </mat-card>
</div>
